<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather app</title>
  <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
</head>
<body>
  <div class="head">
    <canvas>
      <i class="fa-solid fa-location-dot"></i>
      <p class="city-name">New Delhi, IN</p>
      <p class="day-date-time">Thursday, 21 May 2026 - 10:32 AM</p>
    </canvas>
  </div>

  <div class="searchbar">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input type="text" placeholder="Search city...">
  </div>

  <span>
    <p class="temp">34°C</p>
    <p class="weather">Partly Sunny</p>
    <p class="exact-temp">Fells like 37°C · High 39° · Low 28°</p>
  </span>

  <div class="weather-stat">
    
    <div class="humidity">
      <i class="fa-solid fa-droplet"></i>
      <p class="humid-percent">62%</p>
      <p class="name">Humidity</p>
    </div>

    <div class="wind">
      <i class="fa-solid fa-wind"></i>
      <p class="wind-speed">18 km/h</p>
      <p class="name">Wind</p>
    </div>

    <div class="visibility">
      <i class="fa-solid fa-eye"></i>
      <p class="vis-dist">8 km</p>
      <p class="name">Visibility</p>
    </div>

  </div>

  <p class="hourly-name">Hourly Forecast</p>
  <div class="hourly-forecast">

    <div class="now">
      <p>Now</p>
      <i class="fa-regular fa-sun"></i>
      <p class="temp">34°</p>
    </div>

    <div class="plus-2-hours">
      <p>12 PM</p>
      <i class="fa-regular fa-sun"></i>
      <p class="temp">37°</p>
    </div>

    <div class="plus-4-hours">
      <p>2 PM</p>
      <i class="fa-regular fa-cloud"></i>
      <p class="temp">39°</p>
    </div>

    <div class="plus-6-hours">
      <p>4 PM</p>
      <i class="fa-solid fa-cloud-sun-rain"></i>
      <p class="temp">33°</p>
    </div>

    <div class="plus-8-hours">
      <p>6 PM</p>
      <i class="fa-solid fa-cloud-bolt"></i>  
      <p class="temp">29°</p>
    </div>

    <div class="plus-10-hours">
      <p>8 PM</p>
      <i class="fa-solid fa-moon"></i>
      <p class="temp">27°</p>
    </div>

    <div class="plus-12-hours">
      <p>10 PM</p>
      <i class="fa-solid fa-moon"></i>
      <p class="temp">25°</p>
    </div>

  </div>

  <p class="5-day-name">5-Day Forecast</p>
  
</body>
</html>
